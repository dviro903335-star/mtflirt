<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DARK WINGMAN | AI Engine</title>
    <style>
        :root { --gold: #d4af37; --bg: #050505; --card: #121212; --text: #e0e0e0; }
        body, html { margin: 0; padding: 0; background: var(--bg); height: 100%; font-family: -apple-system, system-ui, sans-serif; color: var(--text); overflow-x: hidden; }
        .container { display: flex; flex-direction: column; min-height: 100vh; padding: 50px 20px 30px; box-sizing: border-box; max-width: 500px; margin: 0 auto; }
        
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-size: 2rem; font-weight: 200; letter-spacing: 5px; margin: 0; text-transform: uppercase; color: #fff; }
        .header h1 span { font-weight: 900; color: var(--gold); }
        .header p { font-size: 0.6rem; letter-spacing: 3px; color: #444; margin-top: 5px; }

        .vibe-selector { display: flex; gap: 10px; margin-bottom: 20px; }
        .vibe-btn { flex: 1; background: #1a1a1a; border: 1px solid #333; color: #888; padding: 12px; border-radius: 8px; font-size: 0.8rem; cursor: pointer; transition: 0.3s; }
        .vibe-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(212, 175, 55, 0.05); }

        .input-area { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid #222; margin-bottom: 20px; }
        textarea { width: 100%; background: transparent; border: none; color: #fff; font-size: 1.1rem; outline: none; resize: none; text-align: right; font-family: inherit; }
        
        .action-btn { background: var(--gold); color: #000; width: 100%; border-radius: 10px; padding: 20px; border: none; font-weight: 800; font-size: 1rem; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .action-btn:active { transform: scale(0.98); opacity: 0.9; }

        #results { margin-top: 40px; display: none; animation: fadeIn 0.5s ease; }
        .subtext-box { background: rgba(212, 175, 55, 0.1); border-right: 3px solid var(--gold); padding: 15px; border-radius: 8px; font-size: 0.95rem; margin-bottom: 25px; line-height: 1.6; }
        .reply-card { background: var(--card); padding: 18px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #222; cursor: pointer; position: relative; }
        .reply-card b { color: var(--gold); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 8px; }
        .reply-card p { margin: 0; font-size: 1.1rem; font-weight: 500; }
        
        .loader { display: none; text-align: center; color: var(--gold); font-size: 0.7rem; letter-spacing: 4px; padding: 30px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>DARK<span>WINGMAN</span></h1>
        <p>ADVANCED SOCIAL INTELLIGENCE</p>
    </div>

    <div class="vibe-selector">
        <button class="vibe-btn active" onclick="setVibe('עוקצני', this)">עוקצני</button>
        <button class="vibe-btn" onclick="setVibe('מסתורי', this)">מסתורי</button>
        <button class="vibe-btn" onclick="setVibe('ישיר', this)">ישיר</button>
    </div>

    <div class="input-area">
        <textarea id="userInput" rows="3" placeholder="מה היא כתבה? (או תאר את התמונה שלה)"></textarea>
    </div>

    <button class="action-btn" onclick="runAI()">Analyze & Generate</button>

    <div id="loader" class="loader">DECRYPTING SUBTEXT...</div>

    <div id="results">
        <div class="subtext-box" id="subtext"></div>
        <div id="replyList"></div>
    </div>
</div>

<script>
    let currentVibe = 'עוקצני';

    function setVibe(vibe, btn) {
        currentVibe = vibe;
        document.querySelectorAll('.vibe-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    async function runAI() {
        const text = document.getElementById('userInput').value.trim();
        if(!text) return;

        document.getElementById('loader').style.display = 'block';
        document.getElementById('results').style.display = 'none';

        const apiKey = "AIzaSyCQ8LPtzo7mhz-ICSIHyvr-ILvAYRxTADg"; // תוודא שהמפתח Active ב-AI Studio
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;

        const prompt = `אתה DARK WINGMAN, מומחה דייטינג חריף. נתח את זה: "${text}".
        וייב מבוקש: ${currentVibe}.
        תחזיר תשובה בפורמט JSON בלבד:
        {"analysis": "מה היא באמת חושבת בסאבטקסט (קצר וחריף)", 
         "replies": ["תגובה 1 בסגנון ${currentVibe}", "תגובה 2 בסגנון ${currentVibe}", "תגובה 3 בסגנון ${currentVibe}"]}
        תהיה אלפא, לא מתנצל, ועוקצני.`;

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await response.json();
            const cleanText = data.candidates[0].content.parts[0].text.replace(/```json/g, '').replace(/```/g, '').trim();
            const res = JSON.parse(cleanText);

            document.getElementById('subtext').innerText = "SUBTEXT: " + res.analysis;
            const list = document.getElementById('replyList');
            list.innerHTML = '';
            res.replies.forEach(r => {
                list.innerHTML += `<div class="reply-card" onclick="copyText('${r}')"><b>${currentVibe}</b><p>${r}</p></div>`;
            });

            document.getElementById('loader').style.display = 'none';
            document.getElementById('results').style.display = 'block';
        } catch (e) {
            alert("תקלה בחיבור. וודא שהמפתח ב-AI Studio מוגדר כ-Active.");
            document.getElementById('loader').style.display = 'none';
        }
    }

    function copyText(t) {
        navigator.clipboard.writeText(t);
        alert("התגובה הועתקה! שלח לה.");
    }
</script>
</body>
</html>
